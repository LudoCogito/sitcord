name: Beta Build

# Produces tester/pre-release builds with the Discord client secret baked in.
# This is required until Discord approves our RPC submission (Task 12), because
# privileged scopes (rpc.voice.write) are rejected for public PKCE clients.
#
# IMPORTANT: These builds contain DISCORD_CLIENT_SECRET embedded in the binary.
# Treat every artifact produced here as "testers only" — do NOT promote to a
# production release. Before public distribution:
#   1. Complete the Discord RPC approval process (Task 12).
#   2. Remove DISCORD_CLIENT_SECRET from the build (electron.vite.config.ts).
#   3. Use the release.yml workflow instead.
#
# Versioning: each run derives a unique prerelease version of the form
# <base>-beta.<run_number> (e.g. 0.1.3-beta.42), where <base> is the plain
# version in package.json. This tags the GitHub release v<base>-beta.<run_number>
# so beta builds never collide with the production v<base> tag, and electron-
# updater treats the -beta.N suffix as a prerelease channel automatically.
#
# Trigger: run manually from the Actions tab. After CI completes, go to
# Releases, find the pre-release draft, verify the assets, and publish it.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  beta:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Stamp a unique prerelease version for this run. --no-git-tag-version
      # edits package.json in the runner only (never committed). All matrix jobs
      # share GITHUB_RUN_NUMBER, so each OS produces the same v<base>-beta.<n> tag
      # and electron-builder uploads them all to one release.
      - name: Set beta version
        shell: bash
        run: |
          BASE=$(node -p "require('./package.json').version.split('-')[0]")
          npm version "$BASE-beta.$GITHUB_RUN_NUMBER" --no-git-tag-version --allow-same-version
          echo "Beta version: $BASE-beta.$GITHUB_RUN_NUMBER"

      - name: Build bundles
        run: npm run build
        env:
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          # Baked into the binary for tester builds. Remove before public release.
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}

      - name: Build installers and publish pre-release draft
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Mark this release as a pre-release so it's visually distinct from
          # production releases in the GitHub Releases list.
          EP_PRE_RELEASE: true
