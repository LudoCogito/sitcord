name: Deploy Pages

# Publishes the static marketing/legal site in site/ to GitHub Pages. The Terms
# of Service and Privacy Policy pages give Discord the stable public URLs it
# requires for a distributed app.
#
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source:
# "GitHub Actions". The site is then served at https://ludocogito.github.io/sitcord/

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; don't cancel an in-progress deploy mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
