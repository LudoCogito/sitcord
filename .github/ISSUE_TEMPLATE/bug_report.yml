name: Bug report
description: Something in Sitcord isn't working as expected.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please don't include any
        secrets (your Discord token lives in Sitcord's local config — never paste it).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Sitcord
        2. ...
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Sitcord version
      description: Shown in the bottom-right corner of the app.
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: controller
    attributes:
      label: Controller / input device
      placeholder: Xbox Series controller, DualSense, keyboard only, ...
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Drag in screenshots or paste console output. Redact anything sensitive.
